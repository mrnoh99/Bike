name: BikeComputer
options:
  bundleIdPrefix: com.example.bikecomputer
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO

# 과거 코스 오버레이용 Google 지도 SDK. 쓰지 않으려면 이 packages 블록과
# 아래 BikeComputer 의 GoogleMaps 의존성을 지우면 Apple 지도로 폴백한다.
packages:
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: "9.0.0"

targets:
  # 아이폰 앱
  BikeComputer:
    type: application
    platform: iOS
    sources:
      - path: BikeComputer
    info:
      path: BikeComputer/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bikecomputer
        INFOPLIST_FILE: BikeComputer/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: BikeComputer/App/BikeComputer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BikeComputerWatch
        embed: true
      - package: GoogleMaps
        product: GoogleMaps

  # 애플워치 컴패니언 앱 (실시간 심박 측정)
  BikeComputerWatch:
    type: application
    platform: watchOS
    sources:
      - path: BikeComputerWatch
    info:
      path: BikeComputerWatch/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.bikecomputer.watchkitapp
        INFOPLIST_FILE: BikeComputerWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: BikeComputerWatch/BikeComputerWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
